services:
  - type: web
    name: woke-or-not
    runtime: node
    plan: starter
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_SITE_URL
        value: https://woke-or-not.onrender.com
      - key: ADMIN_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: woke-or-not-db
          property: connectionString

databases:
  - name: woke-or-not-db
    plan: starter
